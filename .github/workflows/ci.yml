name: CI

on:
  push:
    branches: [main]
    paths:
      - "CLI/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "CLI/**"
  release:
    types: [published]

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CLI

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: CLI/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check cli_core.py embedding_client.py main.py mcp_server.py build.py dialog_logger.py knowledge_reader.py

      - name: Type check with mypy
        run: |
          mypy cli_core.py --ignore-missing-imports --check-untyped-defs || true
        continue-on-error: true

  # ── Test ──────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CLI

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: CLI/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx websockets numpy
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short -m "not integration"

      - name: Run integration tests
        run: |
          python -m pytest tests/ -v --tb=short -m "integration"

  # ── Build CLI executables (on release) ────────────────────────────────
  build:
    name: Build CLI
    if: github.event_name == 'release'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: CLI

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: CLI/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executables
        run: |
          python build.py --clean

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentcanvas-cli-${{ github.event.release.tag_name }}
          path: |
            Assets/StreamingAssets/AgentCanvas/cli.exe
            Assets/StreamingAssets/AgentCanvas/mcp.exe
            Assets/StreamingAssets/AgentCanvas/.env.example
          if-no-files-found: error

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          ASSETS_DIR="$(pwd)/../Assets/StreamingAssets/AgentCanvas"
          gh release upload ${{ github.event.release.tag_name }} \
            "$ASSETS_DIR/cli.exe" \
            "$ASSETS_DIR/mcp.exe" \
            "$ASSETS_DIR/.env.example" \
            --clobber
